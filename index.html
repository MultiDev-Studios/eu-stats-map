<!DOCTYPE html>
<html>
<head>
  <title>EU Stats Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
    h1 { margin-top: 10px; }
    #controls { margin: 10px; }
    
    /* Map container */
    #map { height: 60vh; width: 80%; margin: 0 auto; border: 1px solid #ccc; border-radius: 8px; }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      padding: 15px 25px;
      border-radius: 8px;
      font-weight: bold;
      display: none;
      z-index: 1000;
    }

    /* Range bar */
    #rangeBar {
      height: 30px;
      width: 60%;
      margin: 10px auto;
      background: #eee;
      position: relative;
      border-radius: 5px;
    }
    #rangeBar .marker {
      position: absolute;
      top: 0;
      height: 100%;
      width: 2px;
      background: black;
    }
    #rangeBar .label {
      position: absolute;
      top: 100%;
      font-size: 12px;
      transform: translateX(-50%);
    }

    /* Table */
    table { width: 80%; margin: 20px auto; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: right; }
    th { cursor: pointer; background: #f2f2f2; }
    th:first-child, td:first-child { text-align: left; }
    tr.highlight { background: #ffeaa7; }
  </style>
</head>
<body>

<h1>EU Stats Map</h1>

<div id="controls">
  <label for="dataset">Select dataset:</label>
  <select id="dataset">
    <option value="DEMO_R_D3DENS">Population density</option>
    <option value="demo_pjan">Population by age</option>
    <option value="nama_10_gdp">GDP</option>
  </select>
</div>

<div id="loading">Loading data...</div>
<div id="rangeBar"></div>
<div id="map"></div>

<h2>Country Data Table</h2>
<table id="dataTable">
  <thead>
    <tr>
      <th data-sort="name">Country</th>
      <th data-sort="value">Value</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
