<!DOCTYPE html>
<html>
<head>
  <title>EU Stats Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 0; 
      text-align: center; 
      transition: background 0.3s; 
    }
    h1 { margin-top: 10px; }

    #controls { margin: 10px; }

    /* Container for map + table side by side */
    #mainContainer { 
      display: flex; 
      justify-content: center; 
      align-items: flex-start; 
      width: 95%; 
      margin: 0 auto; 
      gap: 20px; 
    }

    /* Map container */
    #map { 
      height: 70vh; 
      width: 60%; 
      border: 1px solid #ccc; 
      border-radius: 8px; 
    }

    /* Table container */
    #tableContainer {
      width: 35%; 
      max-height: 70vh; 
      overflow-y: auto; 
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
    }
    th, td { 
      border: 1px solid #ccc; 
      padding: 6px 10px; 
      text-align: right; 
      transition: background 0.3s; 
    }
    th { 
      cursor: pointer; 
      background: #f2f2f2; 
      position: relative; 
    }
    th.asc::after { content: " ↑"; }
    th.desc::after { content: " ↓"; }

    th:first-child, td:first-child { text-align: left; }
    tr.highlight { background: #ffeaa7; }

    /* Loading overlay */
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.9);
      padding: 15px 25px;
      border-radius: 8px;
      font-weight: bold;
      display: none;
      z-index: 1000;
    }

    /* Range bar */
    #rangeBar {
      height: 30px;
      width: 60%;
      margin: 10px auto;
      background: #eee;
      position: relative;
      border-radius: 5px;
    }
    #rangeBar .marker {
      position: absolute;
      top: 0;
      height: 100%;
      width: 2px;
      background: black;
    }
    #rangeBar .label {
      position: absolute;
      top: 100%;
      font-size: 12px;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<h1>EU Stats Map</h1>

<div id="controls">
  <label for="dataset">Select dataset:</label>
  <select id="dataset">
    <option value="DEMO_R_D3DENS">Population density</option>
    <option value="demo_pjan">Population by age</option>
    <option value="nama_10_gdp">GDP</option>
  </select>
</div>

<div id="loading">Loading data...</div>
<div id="rangeBar"></div>

<div id="mainContainer">
  <div id="map"></div>
  <div id="tableContainer">
    <table id="dataTable">
      <thead>
        <tr>
          <th data-sort="name">Country</th>
          <th data-sort="value">Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
